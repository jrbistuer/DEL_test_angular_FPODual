# Local development stack — for student use only. Uses a local MongoDB, not Atlas.

services:
  backend:
    # Build the NestJS backend from the backend/ subdirectory
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Map host port 3000 to container port 3000
      - "3000:3000"
    env_file:
      # Load environment variables from the .env file at repo root
      - .env
    environment:
      # Use the local mongo service instead of Atlas
      MONGO_URI: mongodb://mongo:27017/course_db
    depends_on:
      # Ensure the mongo service starts before the backend
      - mongo

  mongo:
    # Official MongoDB 7 image
    image: mongo:7
    ports:
      # Expose MongoDB on default port for local tooling (e.g. MongoDB Compass)
      - "27017:27017"
    volumes:
      # Named volume to persist data across container restarts
      - mongo_data:/data/db

volumes:
  # Declare the named volume for MongoDB data persistence
  mongo_data:
