<div class="pedido-item">
  <div style="font-weight: 600;">Nombre: {{ item().nombre }}</div>
  <div>Precio: <span style="color: blue; font-weight: 600;">{{ item().precio }}</span></div>
  <div>Fecha: {{ item().fecha }}</div>
  <div>Stock: {{ item().stock ? 'Sí' : 'No' }}</div>
  <div>Descripción: {{ item().descripcion }}</div>
  <div>Cantidad: {{ item().cantidad }}</div>
</div>
<div>
  <button (click)="eliminarPedido($index())">Eliminar</button>
  <button (click)="editarPedido($index())">Editar</button>
</div>
<hr>
