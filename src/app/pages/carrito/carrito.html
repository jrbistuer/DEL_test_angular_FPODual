<app-header [titulo]="'Carrito'"></app-header>

<abbr title="Carrito de compras">Carrito</abbr>

@for (item of pedidoService.pedidos(); track $index) {
<app-pedido-card [item]="item" [$index]="$index"
      (onEditarCLicked)="editarItem($index)"
      (onELiminarCLicked)="eliminarItem($index)"></app-pedido-card>
}
